<!DOCTYPE html>
<html>

<head>
    <title>HosScan Explorer</title>
    <link rel="stylesheet" href="../CSS/HosScan.css">
</head>

<body>

    <div class="Navbar">
        <div class="Logo">🚀 HosScan</div>
        <div class="Nav_Items">
            <span>Home</span>
            <span>Blockchain</span>
            <span>Transactions</span>
            <span>Blocks</span>
        </div>
    </div>

    <div class="Search_Section">
        <input id="Search_Input" placeholder="Search By Tx Hash / Block / Address">
        <button onclick="Search_Data()">Search</button>
    </div>

    <div class="Stats">
        <div class="Card">
            <h3>Total Blocks</h3>
            <p id="Total_Blocks">0</p>
        </div>

        <div class="Card">
            <h3>Total Transactions</h3>
            <p id="Total_Tx">0</p>
        </div>
    </div>

    <div class="Main_Container">

        <div class="Left">
            <h2>Latest Blocks</h2>
            <div id="Blocks_List"></div>
        </div>

        <div class="Right">
            <h2>Latest Transactions</h2>
            <div id="Tx_List"></div>
        </div>

    </div>

    <div class="Search_Result" id="Search_Result"></div>

    <script src="../JS/HosScan.js"></script>

</body>

</html>
